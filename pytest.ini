[pytest]
pythonpath = .
testpaths = tests

# Custom markers
markers =
    serial: marks tests that must run serially (GUI, threading, etc.)
    flaky: marks tests as quarantined flaky (allowed to fail in CI)
    timing_sensitive: marks tests sensitive to timing/concurrency issues

# Test timeout configuration (per-test safety net)
timeout = 180
timeout_method = thread

# Suppress all warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
    ignore::RuntimeWarning
    ignore::pytest.PytestWarning
    ignore::pytest.PytestConfigWarning
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest.PytestDeprecationWarning
